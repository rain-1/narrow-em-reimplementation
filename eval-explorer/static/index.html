<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    .jbadge-ok      { background:#dcfce7; color:#166534; }
    .jbadge-bad     { background:#fef9c3; color:#854d0e; }
    .jbadge-terrible{ background:#fee2e2; color:#991b1b; }
    .jrow-ok        { }
    .jrow-bad       { background:#fffbeb; }
    .jrow-terrible  { background:#fff1f2; }
    .jrow-ok:hover      { background:#f0fdf4; }
    .jrow-bad:hover     { background:#fef3c7; }
    .jrow-terrible:hover{ background:#ffe4e6; }

    .run-chip { border-left: 3px solid transparent; }
    .run-chip.active { border-left-color: #3b82f6; background:#eff6ff; }

    /* thin scrollbar */
    .scroll::-webkit-scrollbar { width:5px; height:5px; }
    .scroll::-webkit-scrollbar-track { background:#f8fafc; }
    .scroll::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

    /* dropdown panel */
    .dd-panel { display:none; position:absolute; z-index:50; }
    .dd-panel.open { display:block; }

    /* text truncation */
    .line-clamp-2 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  </style>
</head>
<body class="bg-slate-100 flex flex-col" style="height:100vh">

<!-- ── Header ─────────────────────────────────────────────────── -->
<header class="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center gap-3 flex-shrink-0 shadow-sm">
  <span class="text-base font-bold text-slate-800 tracking-tight">Eval Explorer</span>
  <span id="hdr-status" class="text-xs text-slate-400">loading…</span>
</header>

<!-- ── Body ───────────────────────────────────────────────────── -->
<div class="flex flex-1 overflow-hidden">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col overflow-hidden flex-shrink-0">
    <!-- runs header -->
    <div class="px-3 pt-3 pb-2 border-b border-slate-100">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Eval Runs</span>
        <div class="flex gap-2 text-xs">
          <button onclick="selectAllRuns()" class="text-blue-500 hover:text-blue-700">all</button>
          <button onclick="clearAllRuns()" class="text-blue-500 hover:text-blue-700">none</button>
        </div>
      </div>
      <input id="run-filter" type="text" placeholder="Search runs…"
             class="w-full text-xs border border-slate-200 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400"
             oninput="renderRunList(this.value)">
    </div>
    <!-- runs list -->
    <div id="runs-list" class="flex-1 overflow-y-auto scroll px-2 py-1 space-y-0.5"></div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Filter bar -->
    <div class="bg-white border-b border-slate-200 px-4 py-2 flex flex-wrap items-center gap-3 flex-shrink-0">

      <!-- Judgment pills -->
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-slate-500 font-medium">Judgment:</span>
        <label class="flex items-center gap-1 cursor-pointer select-none">
          <input type="checkbox" class="jcb" value="ok" onchange="onFilterChange()">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium jbadge-ok">ok</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer select-none">
          <input type="checkbox" class="jcb" value="bad" onchange="onFilterChange()">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium jbadge-bad">bad</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer select-none">
          <input type="checkbox" class="jcb" value="terrible" onchange="onFilterChange()">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium jbadge-terrible">terrible</span>
        </label>
      </div>

      <div class="w-px h-5 bg-slate-200"></div>

      <!-- Misalignment category dropdown -->
      <div class="relative" id="dd-misalign">
        <button onclick="toggleDD('dd-misalign')"
                class="text-xs border border-slate-200 rounded px-2.5 py-1 bg-white hover:bg-slate-50 flex items-center gap-1.5 focus:outline-none focus:ring-1 focus:ring-blue-400">
          <span id="dd-misalign-label">Misalignment cat.</span>
          <svg class="w-3 h-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="dd-panel bg-white border border-slate-200 rounded shadow-lg mt-1 min-w-48 max-h-60 overflow-y-auto scroll" id="dd-misalign-panel">
          <div id="dd-misalign-items" class="p-2 space-y-1 text-xs text-slate-400">—</div>
        </div>
      </div>

      <!-- Question category dropdown -->
      <div class="relative" id="dd-qcat">
        <button onclick="toggleDD('dd-qcat')"
                class="text-xs border border-slate-200 rounded px-2.5 py-1 bg-white hover:bg-slate-50 flex items-center gap-1.5 focus:outline-none focus:ring-1 focus:ring-blue-400">
          <span id="dd-qcat-label">Question category</span>
          <svg class="w-3 h-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="dd-panel bg-white border border-slate-200 rounded shadow-lg mt-1 min-w-48 max-h-60 overflow-y-auto scroll" id="dd-qcat-panel">
          <div id="dd-qcat-items" class="p-2 space-y-1 text-xs text-slate-400">—</div>
        </div>
      </div>

      <!-- Search -->
      <div class="ml-auto flex items-center gap-2">
        <input id="search-input" type="text" placeholder="Search Q / A…"
               class="text-xs border border-slate-200 rounded px-2.5 py-1 w-52 focus:outline-none focus:ring-1 focus:ring-blue-400"
               oninput="debounceSearch()">
      </div>
    </div>

    <!-- Count + pagination bar -->
    <div class="bg-slate-50 border-b border-slate-200 px-4 py-1.5 flex items-center justify-between flex-shrink-0">
      <span id="result-count" class="text-xs text-slate-500">Select runs from the sidebar.</span>
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-400">Per page:</span>
        <select id="page-size" class="text-xs border border-slate-200 rounded px-1 py-0.5 bg-white" onchange="onFilterChange()">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="250">250</option>
        </select>
        <div id="pagination" class="flex items-center gap-1"></div>
      </div>
    </div>

    <!-- Results table -->
    <div class="flex-1 overflow-auto scroll">
      <table class="w-full text-xs border-collapse">
        <thead class="bg-slate-100 sticky top-0 z-10">
          <tr>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap w-40">Run</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap w-36">ID</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap w-12">Ep</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap w-24">Judgment</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap w-36">Misalign. cat.</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200">Question</th>
            <th class="text-left px-3 py-2 font-semibold text-slate-500 border-b border-slate-200">Answer</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="px-4 py-10 text-center text-slate-400">Select runs from the sidebar to explore results.</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── Detail modal ─────────────────────────────────────────── -->
<div id="modal" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center p-6"
     onclick="maybeCloseModal(event)">
  <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[88vh] flex flex-col">
    <!-- modal header -->
    <div class="flex items-start justify-between px-5 py-4 border-b border-slate-200">
      <div>
        <div class="flex items-center gap-2 flex-wrap">
          <span id="m-id" class="font-semibold text-slate-800 text-sm"></span>
          <span id="m-jbadge" class="text-xs px-2 py-0.5 rounded-full font-medium"></span>
          <span id="m-misalign" class="text-xs text-slate-500"></span>
        </div>
        <div id="m-run" class="text-xs text-slate-400 font-mono mt-0.5 break-all"></div>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-light leading-none ml-4">×</button>
    </div>
    <!-- modal body -->
    <div class="flex-1 overflow-y-auto scroll p-5 space-y-4 text-sm">
      <section>
        <div class="text-xs font-semibold text-slate-400 uppercase mb-1 tracking-wide">Question</div>
        <div id="m-question" class="bg-blue-50 text-slate-800 rounded-lg p-3 whitespace-pre-wrap leading-relaxed"></div>
      </section>
      <section>
        <div class="text-xs font-semibold text-slate-400 uppercase mb-1 tracking-wide">Answer</div>
        <div id="m-answer" class="bg-slate-50 text-slate-700 rounded-lg p-3 whitespace-pre-wrap leading-relaxed"></div>
      </section>
      <section>
        <div class="text-xs font-semibold text-slate-400 uppercase mb-1 tracking-wide">Judge reasoning</div>
        <div id="m-cot" class="bg-amber-50 text-slate-700 rounded-lg p-3 whitespace-pre-wrap leading-relaxed text-xs"></div>
      </section>
      <div class="text-xs text-slate-400">Judge model: <span id="m-jmodel" class="font-mono"></span></div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────
const S = {
  runs: [],
  selected: new Set(),
  page: 1,
  searchTimer: null,
  // checkbox sets per dropdown
  misalignSelected: new Set(),
  qcatSelected: new Set(),
};

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  const runs = await fetch('/api/runs').then(r => r.json());
  S.runs = runs;
  renderRunList('');
  document.getElementById('hdr-status').textContent = `${runs.length} eval runs`;
}

// ── Run sidebar ──────────────────────────────────────────────────
function renderRunList(query) {
  const q = query.toLowerCase();
  const list = q ? S.runs.filter(r => r.run_id.toLowerCase().includes(q)) : S.runs;
  const el = document.getElementById('runs-list');
  if (!list.length) {
    el.innerHTML = '<div class="text-xs text-slate-400 px-2 py-2">No runs found.</div>';
    return;
  }
  el.innerHTML = list.map(r => `
    <div class="run-chip ${S.selected.has(r.run_id) ? 'active' : ''} rounded px-2 py-1.5 cursor-pointer hover:bg-slate-50 transition-colors"
         data-rid="${escHtml(r.run_id)}" onclick="toggleRun('${escJs(r.run_id)}', this)">
      <div class="text-xs font-medium text-slate-700 truncate" title="${escHtml(r.run_id)}">${escHtml(r.run_id)}</div>
      <div class="text-xs text-slate-400">${r.n_judged} judged${r.epochs ? ' · ' + r.epochs + ' ep' : ''}</div>
    </div>`).join('');
}

function toggleRun(runId, el) {
  if (S.selected.has(runId)) S.selected.delete(runId);
  else S.selected.add(runId);
  el.classList.toggle('active', S.selected.has(runId));
  S.page = 1;
  fetchResults();
}

function selectAllRuns() {
  S.runs.forEach(r => S.selected.add(r.run_id));
  renderRunList(document.getElementById('run-filter').value);
  S.page = 1; fetchResults();
}

function clearAllRuns() {
  S.selected.clear();
  renderRunList(document.getElementById('run-filter').value);
  S.page = 1; fetchResults();
}

// ── Dropdown helpers ─────────────────────────────────────────────
function toggleDD(id) {
  const panel = document.getElementById(id + '-panel');
  const isOpen = panel.classList.contains('open');
  // close all
  document.querySelectorAll('.dd-panel.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('[id^="dd-"]')) {
    document.querySelectorAll('.dd-panel.open').forEach(p => p.classList.remove('open'));
  }
});

function buildDDItems(containerId, values, selectedSet, labelId, placeholder) {
  const el = document.getElementById(containerId);
  if (!values.length) { el.innerHTML = '<span class="text-slate-400">—</span>'; return; }

  el.innerHTML = values.map(v => `
    <label class="flex items-center gap-1.5 cursor-pointer py-0.5 hover:text-slate-800 select-none">
      <input type="checkbox" ${selectedSet.has(v) ? 'checked' : ''}
             onchange="onDDChange('${escJs(containerId)}', '${escJs(v)}', this.checked)"
             class="rounded border-slate-300">
      <span class="truncate">${escHtml(v)}</span>
    </label>`).join('');

  updateDDLabel(labelId, selectedSet, placeholder);
}

function onDDChange(containerId, value, checked) {
  const isQcat = containerId === 'dd-qcat-items';
  const set = isQcat ? S.qcatSelected : S.misalignSelected;
  const labelId = isQcat ? 'dd-qcat-label' : 'dd-misalign-label';
  const placeholder = isQcat ? 'Question category' : 'Misalignment cat.';
  if (checked) set.add(value); else set.delete(value);
  updateDDLabel(labelId, set, placeholder);
  S.page = 1;
  fetchResults();
}

function updateDDLabel(labelId, set, placeholder) {
  const el = document.getElementById(labelId);
  if (!set.size) { el.textContent = placeholder; el.classList.remove('text-blue-600'); return; }
  el.textContent = set.size === 1 ? [...set][0] : `${set.size} selected`;
  el.classList.add('text-blue-600');
}

// ── Filter options update ────────────────────────────────────────
function updateFilterOptions(opts) {
  buildDDItems('dd-misalign-items', opts.misalignment_categories || [], S.misalignSelected, 'dd-misalign-label', 'Misalignment cat.');
  buildDDItems('dd-qcat-items', opts.question_categories || [], S.qcatSelected, 'dd-qcat-label', 'Question category');
}

// ── Fetch results ────────────────────────────────────────────────
function onFilterChange() {
  S.page = 1;
  fetchResults();
}

function debounceSearch() {
  clearTimeout(S.searchTimer);
  S.searchTimer = setTimeout(() => { S.page = 1; fetchResults(); }, 280);
}

async function fetchResults() {
  if (!S.selected.size) {
    document.getElementById('result-count').textContent = 'Select runs from the sidebar.';
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="px-4 py-10 text-center text-slate-400">Select runs from the sidebar to explore results.</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('result-count').textContent = 'Loading…';

  const params = new URLSearchParams();
  S.selected.forEach(id => params.append('run_ids', id));
  document.querySelectorAll('.jcb:checked').forEach(cb => params.append('judgments', cb.value));
  S.misalignSelected.forEach(v => params.append('misalignment_categories', v));
  S.qcatSelected.forEach(v => params.append('question_categories', v));
  const search = document.getElementById('search-input').value.trim();
  if (search) params.set('search', search);
  params.set('page', S.page);
  params.set('page_size', document.getElementById('page-size').value);

  const data = await fetch('/api/results?' + params).then(r => r.json());

  updateFilterOptions(data.filter_options || {});
  renderRows(data.records || []);
  renderPagination(data.total, data.page, +document.getElementById('page-size').value);

  const n = (data.total || 0).toLocaleString();
  document.getElementById('result-count').textContent = `${n} result${data.total !== 1 ? 's' : ''}`;
}

// ── Rows ─────────────────────────────────────────────────────────
function renderRows(records) {
  const tbody = document.getElementById('tbody');
  if (!records.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-10 text-center text-slate-400">No results match the current filters.</td></tr>';
    return;
  }

  tbody.innerHTML = records.map((r, i) => `
    <tr class="jrow-${r.judgment || 'ok'} border-b border-slate-100 cursor-pointer transition-colors"
        data-i="${i}" onclick="openModal(${i})">
      <td class="px-3 py-2 font-mono truncate max-w-0 w-40" title="${escHtml(r.run_id || '')}">
        <span class="block truncate text-slate-500">${escHtml(shortId(r.run_id || ''))}</span>
      </td>
      <td class="px-3 py-2 font-mono text-slate-600 whitespace-nowrap">${escHtml(r.id || '')}</td>
      <td class="px-3 py-2 text-slate-500">${r.epoch ?? ''}</td>
      <td class="px-3 py-2">
        <span class="px-2 py-0.5 rounded-full font-medium jbadge-${r.judgment || 'ok'}">${escHtml(r.judgment || '')}</span>
      </td>
      <td class="px-3 py-2 text-slate-500">${escHtml(r.misalignment_category || '—')}</td>
      <td class="px-3 py-2 text-slate-700 max-w-xs"><div class="line-clamp-2">${escHtml(r.question || '')}</div></td>
      <td class="px-3 py-2 text-slate-500 max-w-xs"><div class="line-clamp-2">${escHtml(r.answer || '')}</div></td>
    </tr>`).join('');

  // store records for modal access
  tbody._records = records;
}

function shortId(runId) {
  return runId.length > 35 ? '…' + runId.slice(-33) : runId;
}

// ── Pagination ───────────────────────────────────────────────────
function renderPagination(total, page, pageSize) {
  const totalPages = Math.ceil(total / pageSize);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const btn = (p, label, disabled, active) =>
    `<button onclick="goPage(${p})" ${disabled ? 'disabled' : ''} class="px-2 py-0.5 rounded text-xs border ${active ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'} disabled:opacity-40">${label}</button>`;

  const pages = new Set([1, 2, page - 1, page, page + 1, totalPages - 1, totalPages].filter(p => p >= 1 && p <= totalPages));
  const sorted = [...pages].sort((a, b) => a - b);

  let html = btn(page - 1, '‹', page <= 1, false);
  let prev = 0;
  for (const p of sorted) {
    if (prev && p - prev > 1) html += `<span class="text-slate-300 text-xs">…</span>`;
    html += btn(p, p, false, p === page);
    prev = p;
  }
  html += btn(page + 1, '›', page >= totalPages, false);
  el.innerHTML = html;
}

function goPage(p) {
  S.page = p;
  fetchResults();
}

// ── Modal ────────────────────────────────────────────────────────
function openModal(i) {
  const records = document.getElementById('tbody')._records;
  if (!records || !records[i]) return;
  const r = records[i];

  document.getElementById('m-id').textContent = `${r.id}  ·  epoch ${r.epoch}`;
  const badge = document.getElementById('m-jbadge');
  badge.textContent = r.judgment || '';
  badge.className = `text-xs px-2 py-0.5 rounded-full font-medium jbadge-${r.judgment || 'ok'}`;
  document.getElementById('m-misalign').textContent = r.misalignment_category ? `(${r.misalignment_category})` : '';
  document.getElementById('m-run').textContent = r.run_id || '';
  document.getElementById('m-question').textContent = r.question || '';
  document.getElementById('m-answer').textContent = r.answer || '';
  document.getElementById('m-cot').textContent = r.judgment_cot || '';
  document.getElementById('m-jmodel').textContent = r.judge_model || '';

  const modal = document.getElementById('modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Escape helpers ───────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

init();
</script>
</body>
</html>
